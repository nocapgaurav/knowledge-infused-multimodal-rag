services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kimrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: kimrag-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/kimrag-dev-password
      - NEO4J_PLUGINS=[]
    volumes:
      - neo4j_storage:/data

volumes:
  qdrant_storage:
  neo4j_storage:
